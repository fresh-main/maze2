modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

# Mixin configs. compat — опциональный, required=false, для интеграций (sophisticatedbackpacks и т.д.)
mixins=[
    { config = "otbor.mixins.json" },
    { config = "otbor.compat.mixins.json" }
]

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
